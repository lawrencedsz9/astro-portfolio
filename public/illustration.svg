<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f5f5f5" rx="24"/>
  
  <!-- Desk -->
  <rect x="20" y="280" width="360" height="100" fill="#e8e8e8" rx="8"/>
  
  <!-- Laptop base -->
  <rect x="80" y="240" width="240" height="50" fill="#d0d0d0" rx="4"/>
  
  <!-- Laptop screen -->
  <rect x="100" y="120" width="200" height="130" fill="#2d3748" rx="8"/>
  
  <!-- Screen content - browser bars -->
  <rect x="110" y="130" width="180" height="20" fill="#1a202c"/>
  <rect x="110" y="155" width="60" height="8" fill="#4a90e2" opacity="0.7"/>
  <rect x="110" y="167" width="160" height="6" fill="#666" opacity="0.5"/>
  <rect x="110" y="176" width="140" height="6" fill="#666" opacity="0.5"/>
  
  <!-- Red indicator line -->
  <rect x="110" y="185" width="8" height="50" fill="#e74c3c"/>
  
  <!-- Orange box on screen -->
  <rect x="180" y="160" width="60" height="50" fill="#f39c12" rx="4"/>
  
  <!-- Purple floating element top right -->
  <rect x="320" y="80" width="50" height="50" fill="#9b59b6" rx="8" transform="rotate(15 345 105)"/>
  
  <!-- Yellow box right side -->
  <rect x="310" y="180" width="45" height="45" fill="#f1c40f" rx="6"/>
  
  <!-- Orange box left side -->
  <rect x="30" y="200" width="55" height="55" fill="#e8a34d" rx="8"/>
  
  <!-- Person sitting -->
  <circle cx="70" cy="150" r="18" fill="#c9956d"/>
  
  <!-- Person body -->
  <rect x="58" y="170" width="24" height="50" fill="#ffffff" rx="4"/>
  
  <!-- Person legs -->
  <rect x="60" y="220" width="8" height="30" fill="#333"/>
  <rect x="72" y="220" width="8" height="30" fill="#333"/>
  
  <!-- Person shoes -->
  <ellipse cx="64" cy="250" rx="6" ry="4" fill="#222"/>
  <ellipse cx="76" cy="250" rx="6" ry="4" fill="#222"/>
  
  <!-- Floating cube left -->
  <g transform="translate(45, 80)">
    <path d="M 0 10 L 15 0 L 30 10 L 15 20 Z" fill="#7c3aed" opacity="0.8"/>
    <path d="M 0 10 L 0 30 L 15 40 L 15 20 Z" fill="#6d28d9" opacity="0.9"/>
    <path d="M 15 20 L 15 40 L 30 30 L 30 10 Z" fill="#5b21b6" opacity="0.7"/>
  </g>
  
  <!-- Gear/settings icon right -->
  <g transform="translate(320, 120)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <rect x="-2" y="-14" width="4" height="4" fill="#9b59b6"/>
    <rect x="-2" y="10" width="4" height="4" fill="#9b59b6"/>
    <rect x="-14" y="-2" width="4" height="4" fill="#9b59b6"/>
    <rect x="10" y="-2" width="4" height="4" fill="#9b59b6"/>
  </g>
  
  <!-- Dark sidebar on screen -->
  <rect x="110" y="155" width="25" height="60" fill="#1a202c"/>
  
  <!-- Chat bubbles (blue) -->
  <rect x="240" y="100" width="40" height="35" fill="#4a90e2" rx="8" opacity="0.8"/>
  <polygon points="240,120 240,130 230,125" fill="#4a90e2" opacity="0.8"/>
  
  <!-- Small notification badge -->
  <circle cx="290" cy="110" r="6" fill="#e74c3c"/>
  
  <!-- Coffee cup base -->
  <rect x="25" y="300" width="30" height="40" fill="#8b4513" rx="2"/>
  
  <!-- Coffee cup handle -->
  <path d="M 55 310 Q 70 310 70 320" fill="none" stroke="#8b4513" stroke-width="4"/>
  
  <!-- Headphones on desk -->
  <path d="M 340 280 Q 350 260 360 280" fill="none" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
  <circle cx="340" cy="285" r="6" fill="#7c3aed"/>
  <circle cx="360" cy="285" r="6" fill="#7c3aed"/>
</svg>